<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cloaked Launcher</title>
    <style>
        :root {
            --bg-gradient: radial-gradient(circle at top, #1e293b 0%, #05070a 100%);
            --surface: #0f172a;
            --accent: #6366f1;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            height: 100vh;
            width: 100vw;
            line-height: 1.6;
            overflow: hidden; 
        }

        .container { 
            max-width: 1100px; 
            margin: 0 auto; 
            padding: 40px 20px; 
            height: 100%; 
            overflow-y: auto; 
            overflow-x: hidden;
        }
        
        header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 40px; }
        .logo { display: flex; align-items: center; gap: 12px; font-size: 1.4rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        .logo-box { width: 32px; height: 32px; background: var(--accent); border-radius: 8px; box-shadow: 0 0 20px rgba(99, 102, 241, 0.4); }

        .search-container { margin-bottom: 40px; display: flex; justify-content: center; }
        .search-input {
            width: 100%; max-width: 500px; padding: 14px 24px; border-radius: 18px;
            background: var(--glass); border: 1px solid var(--border); color: white;
            font-size: 1rem; outline: none; transition: var(--transition);
        }
        .search-input:focus { border-color: var(--accent); background: rgba(255,255,255,0.06); box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1); }

        .action-area { display: flex; flex-direction: column; align-items: center; gap: 20px; margin-bottom: 60px; }
        
        .warning-text {
            max-width: 500px;
            text-align: center;
            color: #fca5a5;
            font-size: 0.85rem;
            background: rgba(239, 68, 68, 0.05);
            padding: 12px 20px;
            border-radius: 12px;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .utopia-launch-btn {
            display: flex; align-items: center; gap: 12px; background: var(--glass);
            border: 1px dashed var(--border); padding: 14px 32px; border-radius: 20px;
            cursor: pointer; transition: var(--transition); backdrop-filter: blur(10px);
            text-decoration: none; color: white;
        }
        .utopia-launch-btn:hover { border-color: var(--accent); transform: translateY(-3px); background: rgba(99, 102, 241, 0.1); }

        .tabs { display: flex; justify-content: center; gap: 12px; margin-bottom: 40px; }
        .btn { padding: 10px 24px; border-radius: 12px; cursor: pointer; font-weight: 600; border: 1px solid var(--border); background: var(--glass); color: var(--text-main); transition: var(--transition); outline: none; }
        .btn-primary { background: var(--accent); border: none; color: white; }
        .tab.active { background: var(--accent); color: white; border-color: transparent; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 24px; padding-bottom: 40px; }
        .card { background: var(--glass); border: 1px solid var(--border); border-radius: 24px; padding: 32px; text-align: center; transition: var(--transition); position: relative; }
        .card.hidden { display: none; }
        .card:hover { border-color: var(--accent); transform: translateY(-8px); background: rgba(255,255,255,0.06); }
        .card-icon { width: 80px; height: 80px; border-radius: 22px; margin-bottom: 20px; object-fit: cover; cursor: pointer; transition: var(--transition); }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); display: none; align-items: center; justify-content: center; z-index: 10000; }
        .modal.active { display: flex; }
        .modal-content { background: #0f172a; padding: 40px; border-radius: 32px; width: 90%; max-width: 480px; border: 1px solid var(--border); }
        .preset-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .preset-card { padding: 16px; border-radius: 16px; background: var(--glass); display: flex; align-items: center; gap: 12px; cursor: pointer; border: 2px solid transparent; transition: var(--transition); }
        .preset-card.active { border-color: var(--accent); background: rgba(99, 102, 241, 0.1); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo"><div class="logo-box"></div> CLOAKED</div>
        <div style="display: flex; gap: 12px;">
            <button class="btn btn-primary" onclick="location.reload()">RELOAD</button>
            <button class="btn" onclick="UI.toggleModal('settingsModal', true)">CLOAK</button>
        </div>
    </header>

    <div class="search-container">
        <input type="text" class="search-input" id="searchBar" placeholder="Search saved shortcuts..." oninput="UI.filterGrid()">
    </div>

    <div class="action-area">
        <div class="warning-text">
            <b>SECURITY WARNING:</b> Most popular sites (Google, Discord, YouTube, etc.) use strict security headers that will block direct iframe loading.
        </div>

        <div class="utopia-launch-btn" onclick="Launcher.promptOpen()">
            <img src="https://www.gstatic.com/images/icons/material/system/2x/language_white_24dp.png" style="width:24px;height:24px;opacity:0.8;">
            <div class="utopia-text-group">
                <span style="display:block; font-size:0.65rem; color:var(--text-muted); text-transform:uppercase;">Manual Access</span>
                <span style="display:block; font-weight:800; font-size:1.1rem;">OPEN DIRECT URL</span>
            </div>
        </div>
    </div>

    <div class="tabs" id="tabBar">
        <button class="btn tab active" onclick="UI.switchTab('web')">WEB</button>
        <button class="btn tab" onclick="UI.switchTab('games')">GAMES</button>
        <button class="btn tab" onclick="UI.switchTab('apps')">APPS</button>
    </div>

    <div class="grid" id="mainGrid"></div>
</div>

<div class="modal" id="settingsModal">
    <div class="modal-content">
        <h2 style="margin-bottom: 24px; text-align: center;">Tab Disguise</h2>
        <div class="preset-grid" id="presetGrid"></div>
        <button class="btn btn-primary" style="width: 100%; margin-top: 32px;" onclick="UI.toggleModal('settingsModal', false)">SAVE CHANGES</button>
    </div>
</div>

<script>
const DATA = {
    currentTab: "web",
    presets: [
        {id:"google", name:"Google", title:"Google", icon:"https://www.google.com/favicon.ico"},
        {id:"drive", name:"Drive", title:"My Drive - Google Drive", icon:"https://ssl.gstatic.com/docs/doclist/images/drive_2022q3_32dp.png"},
        {id:"canvas", name:"Canvas", title:"Dashboard", icon:"https://wdmcs.instructure.com/favicon.ico"},
        {id:"gmail", name:"Gmail", title:"Gmail", icon:"https://ssl.gstatic.com/ui/v1/icons/mail/rfr/gmail.ico"}
    ],
    shortcuts: {
        web: [
            {name: "Truffled", url: "https://computerlab.strangled.net/", icon: "https://i.imgur.com/Avqlk5Q.jpeg"},
            {name: "AnuraOS", url: "https://anura.pro", icon: "https://i.imgur.com/6vvxLxR.jpeg"},
            {name: "Space", url: "https://gointospace.app", icon: "https://gointospace.app/assets/logo.webp"}
        ],
        games: [
            {name: "GN Math", url: "https://blahaj.dedyn.io/gn.html", icon: "https://cdn.discordapp.com/avatars/1366573040846241894/b449678987d3a22819a5ba8a8a9cba1b.webp?size=80"},
            {name: "Angry Birds Epic", url: "https://truffled.lol/games/Epic/index.html", icon: "https://i.imgur.com/ql7Gz9e.jpeg"}
        ],
        apps: [
            {name: "GeforceNow", url: "https://universityeducation.camdvr.org/a/hvtrs8%2F-pna%7B.eedopcgnmw%2Ccmm-mcln%2F", icon: "https://i.imgur.com/T65qqQJ.png"}
        ]
    }
};

const Launcher = {
    selectedPreset: JSON.parse(localStorage.getItem("preset")) || DATA.presets[1],

    open(url) {
        if (!url) return;
        let finalUrl = this.formatUrl(url);
        const win = window.open("about:blank", "_blank");
        if (!win) return alert("Pop-up blocked!");

        const title = this.selectedPreset.title;
        const icon = this.selectedPreset.icon;

        win.document.write(`
            <!DOCTYPE html>
            <html style="margin:0;padding:0;width:100%;height:100%;overflow:hidden;">
            <head>
                <title>` + title + `</title>
                <link rel="icon" href="` + icon + `">
                <style>
                    body, html { margin:0; padding:0; width:100%; height:100%; overflow:hidden; background:#000; font-family: sans-serif; color: white; }
                    iframe { border:none; width:100%; height:100%; display: block; }
                    #refreshBtn {
                        position: fixed; bottom: 20px; right: 20px; width: 44px; height: 44px;
                        background: rgba(15, 23, 42, 0.9); border: 1px solid rgba(255,255,255,0.1); 
                        border-radius: 50%; cursor: pointer; z-index: 999; display: flex; 
                        align-items: center; justify-content: center; color: white; transition: 0.2s;
                    }
                    #refreshBtn:hover { transform: scale(1.1); background: #000; border-color: #6366f1; }
                    .error-container { 
                        display: flex; flex-direction: column; align-items: center; justify-content: center; 
                        height: 100vh; text-align: center; background: #05070a; padding: 40px; 
                    }
                    h1 { font-size: 2rem; margin-bottom: 20px; color: #f8fafc; }
                    p { font-size: 1.1rem; color: #94a3b8; max-width: 600px; line-height: 1.6; }
                    .reason-box { background: #1e293b; padding: 20px; border-radius: 12px; margin: 30px 0; border: 1px solid #334155; color: #6366f1; font-family: monospace; }
                </style>
            </head>
            <body>
                <iframe id="ifr" src="` + finalUrl + `" allow="fullscreen; autoplay; clipboard-read; clipboard-write;"></iframe>
                
                <button id="refreshBtn" onclick="doRefresh()" title="Refresh Page">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
                </button>

                <script>
                    const ifr = document.getElementById('ifr');
                    const btn = document.getElementById('refreshBtn');

                    function checkFullscreen() {
                        const winRatio = window.innerWidth / window.innerHeight;
                        const screenRatio = screen.width / screen.height;
                        if (Math.abs(winRatio - screenRatio) < 0.01) {
                            btn.style.display = 'none';
                        } else {
                            btn.style.display = 'flex';
                        }
                    }
                    window.addEventListener('resize', checkFullscreen);
                    checkFullscreen();

                    let loadTriggered = false;
                    ifr.onload = () => { loadTriggered = true; };

                    setTimeout(() => {
                        try {
                            if (!loadTriggered && ifr.contentWindow.length === 0) {
                                throw new Error('Blocked');
                            }
                        } catch(e) {
                            document.body.innerHTML = \`
                                <div class="error-container">
                                    <h1>Connection Refused</h1>
                                    <p>This website has triggered an <b>X-Frame-Options</b> refusal. It is purposely blocking itself from being loaded inside an iframe for security.</p>
                                    <div class="reason-box">REASON: SITE_POLICY_REFUSED_IFRAME_CONNECTION</div>
                                    <p><b>Note:</b> You cannot load sites like Google, YouTube, or Discord directly. You must use an unblocked proxy or a site that allows embedding.</p>
                                    <button onclick="window.close()" style="margin-top:30px; padding:12px 24px; background:#6366f1; border:none; color:white; border-radius:8px; cursor:pointer;">Back to Launcher</button>
                                </div>\`;
                        }
                    }, 4500);

                    function doRefresh() {
                        try {
                            ifr.contentWindow.location.reload();
                        } catch(e) {
                            ifr.src = ifr.src;
                        }
                    }

                    window.onkeydown = (e) => { if(e.key === 'Escape') window.location.href = "https://classroom.google.com"; };
                <\/script>
            </body>
            </html>
        `);
    },

    formatUrl(url) {
        url = url.trim();
        if (/^https?:\/\/.*/i.test(url)) return url;
        if (url.includes('.') && !url.includes(' ')) return "https://" + url;
        return "https://www.google.com/search?q=" + encodeURIComponent(url);
    },

    promptOpen() {
        const u = prompt("Enter URL or search term:");
        if (u) this.open(u);
    },

    setPreset(id) {
        this.selectedPreset = DATA.presets.find(p => p.id === id);
        localStorage.setItem("preset", JSON.stringify(this.selectedPreset));
        UI.renderPresets();
    }
};

const UI = {
    renderGrid() {
        const grid = document.getElementById("mainGrid");
        grid.innerHTML = (DATA.shortcuts[DATA.currentTab] || []).map(item => `
            <div class="card">
                <img src="${item.icon}" class="card-icon" onclick="Launcher.open('${item.url}')">
                <div style="font-weight:600; margin-bottom:15px;">${item.name}</div>
                <button class="btn copy-trigger" style="width:100%; font-size:12px;" data-url="${item.url}">Copy Link</button>
            </div>`).join('');
        
        grid.querySelectorAll('.copy-trigger').forEach(btn => {
            btn.onclick = (e) => {
                e.stopPropagation();
                UI.universalCopy(btn.getAttribute('data-url'), btn);
            };
        });
    },

    universalCopy(text, btn) {
        const textArea = document.createElement("textarea");
        textArea.value = text;
        textArea.style.position = "fixed";
        textArea.style.left = "-9999px";
        document.body.appendChild(textArea);
        textArea.select();
        try {
            document.execCommand('copy');
            const originalText = btn.innerText;
            btn.innerText = "COPIED!";
            btn.style.background = "var(--accent)";
            setTimeout(() => {
                btn.innerText = originalText;
                btn.style.background = "var(--glass)";
            }, 1500);
        } catch (err) {}
        document.body.removeChild(textArea);
    },

    filterGrid() {
        const query = document.getElementById("searchBar").value.toLowerCase();
        document.querySelectorAll('.card').forEach(card => {
            card.classList.toggle('hidden', !card.innerText.toLowerCase().includes(query));
        });
    },

    renderPresets() {
        document.getElementById("presetGrid").innerHTML = DATA.presets.map(p => `
            <div class="preset-card ${Launcher.selectedPreset.id === p.id ? 'active' : ''}" onclick="Launcher.setPreset('${p.id}')">
                <img src="${p.icon}" style="width:20px; height:20px; border-radius:4px;">
                <span>${p.name}</span>
            </div>`).join('');
    },

    switchTab(tabId) {
        DATA.currentTab = tabId;
        document.querySelectorAll('.tab').forEach(btn => btn.classList.toggle('active', btn.innerText.toLowerCase() === tabId));
        this.renderGrid();
    },

    toggleModal(id, show) {
        document.getElementById(id).classList.toggle('active', show);
        if (show) this.renderPresets();
    }
};

UI.renderGrid();
</script>
</body>
</html>
