<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cloaked Launcher</title>
    <style>
        :root {
            --bg-gradient: radial-gradient(circle at top, #1e293b 0%, #05070a 100%);
            --surface: #0f172a;
            --accent: #6366f1;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            height: 100vh;
            width: 100vw;
            line-height: 1.6;
            overflow: hidden; 
        }

        .container { 
            max-width: 1100px; 
            margin: 0 auto; 
            padding: 40px 20px; 
            height: 100%; 
            overflow-y: auto; 
            overflow-x: hidden;
        }
        
        header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 40px; }
        .logo { display: flex; align-items: center; gap: 12px; font-size: 1.4rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        .logo-box { width: 32px; height: 32px; background: var(--accent); border-radius: 8px; box-shadow: 0 0 20px rgba(99, 102, 241, 0.4); }

        .search-container { margin-bottom: 40px; display: flex; justify-content: center; }
        .search-input, .edit-input, .alt-textarea {
            width: 100%; max-width: 500px; padding: 14px 24px; border-radius: 18px;
            background: var(--glass); border: 1px solid var(--border); color: white;
            font-size: 1rem; outline: none; transition: var(--transition);
        }
        
        .alt-textarea { 
            max-width: 100%; height: 150px; resize: none; font-family: monospace; font-size: 13px; 
            background: rgba(0,0,0,0.2); color: var(--accent);
        }

        .action-area { display: flex; flex-direction: column; align-items: center; gap: 20px; margin-bottom: 60px; }
        
        .utopia-launch-btn {
            display: flex; align-items: center; gap: 12px; background: var(--glass);
            border: 1px dashed var(--border); padding: 14px 32px; border-radius: 20px;
            cursor: pointer; transition: var(--transition); backdrop-filter: blur(10px);
            text-decoration: none; color: white;
        }
        .utopia-launch-btn:hover { border-color: var(--accent); transform: translateY(-3px); background: rgba(99, 102, 241, 0.1); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 24px; padding-bottom: 40px; }
        .card { background: var(--glass); border: 1px solid var(--border); border-radius: 24px; padding: 25px; text-align: center; transition: var(--transition); position: relative; }
        .card.hidden { display: none; }
        .card:hover { border-color: var(--accent); transform: translateY(-8px); background: rgba(255,255,255,0.06); }
        .card-icon { width: 80px; height: 80px; border-radius: 22px; margin-bottom: 20px; object-fit: cover; cursor: pointer; }

        .btn-group { display: flex; gap: 8px; margin-top: 15px; }
        .btn { padding: 10px 18px; border-radius: 12px; cursor: pointer; font-weight: 600; border: 1px solid var(--border); background: var(--glass); color: var(--text-main); transition: var(--transition); font-size: 12px; flex: 1; outline: none; }
        .btn-primary { background: var(--accent); border: none; color: white; }
        
        .tabs { display: flex; justify-content: center; gap: 12px; margin-bottom: 40px; }
        .tab.active { background: var(--accent); color: white; border-color: transparent; }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); display: none; align-items: center; justify-content: center; z-index: 10000; }
        .modal.active { display: flex; }
        .modal-content { background: #0f172a; padding: 40px; border-radius: 32px; width: 90%; max-width: 480px; border: 1px solid var(--border); }
        
        .edit-field { margin-bottom: 15px; text-align: left; }
        .edit-label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 5px; text-transform: uppercase; }
        .edit-input { max-width: 100%; border-radius: 12px; padding: 10px 15px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo"><div class="logo-box"></div> CLOAKED</div>
        <div style="display: flex; gap: 12px;">
            <button class="btn btn-primary" onclick="UI.toggleModal('altLinksModal', true)">ALTERNATE LINKS</button>
            <button class="btn" onclick="UI.toggleModal('settingsModal', true)">CLOAK</button>
        </div>
    </header>

    <div class="search-container">
        <input type="text" class="search-input" id="searchBar" placeholder="Search saved shortcuts..." oninput="UI.filterGrid()">
    </div>

    <div class="action-area">
        <div class="utopia-launch-btn" onclick="Launcher.promptOpen()">
            <img src="https://www.gstatic.com/images/icons/material/system/2x/language_white_24dp.png" style="width:24px;height:24px;opacity:0.8;">
            <div class="utopia-text-group">
                <span style="display:block; font-size:0.65rem; color:var(--text-muted); text-transform:uppercase;">Manual Access</span>
                <span style="display:block; font-weight:800; font-size:1.1rem;">OPEN DIRECT URL</span>
            </div>
        </div>
    </div>

    <div class="tabs" id="tabBar">
        <button class="btn tab active" onclick="UI.switchTab('web')">WEB</button>
        <button class="btn tab" onclick="UI.switchTab('games')">GAMES</button>
        <button class="btn tab" onclick="UI.switchTab('apps')">APPS</button>
    </div>

    <div class="grid" id="mainGrid"></div>
</div>

<div class="modal" id="editModal">
    <div class="modal-content">
        <h2 style="margin-bottom: 20px;">Edit Shortcut</h2>
        <div class="edit-field">
            <span class="edit-label">Display Name</span>
            <input type="text" id="editName" class="edit-input">
        </div>
        <div class="edit-field">
            <span class="edit-label">URL</span>
            <input type="text" id="editUrl" class="edit-input">
        </div>
        <div class="edit-field">
            <span class="edit-label">Icon URL</span>
            <input type="text" id="editIcon" class="edit-input">
        </div>
        <div class="btn-group">
            <button class="btn btn-primary" onclick="UI.saveEdit()">SAVE CHANGES</button>
            <button class="btn" onclick="UI.toggleModal('editModal', false)">CANCEL</button>
        </div>
    </div>
</div>

<div class="modal" id="altLinksModal">
    <div class="modal-content">
        <h2 style="margin-bottom: 10px;">Alternate Links</h2>
        <p style="font-size: 13px; color: var(--text-muted); margin-bottom: 20px;">Mirror list for when main links are blocked.</p>
        <textarea class="alt-textarea" readonly>
MAIN: truffled.lol
MIRROR 1: computerlab.strangled.net

MIRROR 2: https://calculatorsolver-truffled.azure-cost-estimator.se/

MIRROR 3: https://algebra1topics.arionskyclub.com

MIRROR 4: https://supermath.salavat.ru
-------------------------------------
MAIN: (ANGRY BIRDS EPIC) https://truffled.lol/games/Epic/index.html

MIRROR 1: https://riaannn.github.io/Epic/
        </textarea>
        <button class="btn btn-primary" style="width: 100%; margin-top: 20px;" onclick="UI.toggleModal('altLinksModal', false)">CLOSE</button>
    </div>
</div>

<div class="modal" id="settingsModal">
    <div class="modal-content">
        <h2 style="margin-bottom: 24px; text-align: center;">Tab Disguise</h2>
        <div class="preset-grid" id="presetGrid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;"></div>
        <button class="btn btn-primary" style="width: 100%; margin-top: 32px;" onclick="UI.toggleModal('settingsModal', false)">SAVE CHANGES</button>
    </div>
</div>

<script>
const DEFAULT_SHORTCUTS = {
    web: [
        {name: "Truffled", url: "https://computerlab.strangled.net/", icon: "https://i.imgur.com/Avqlk5Q.jpeg"},
        {name: "AnuraOS", url: "https://anura.pro", icon: "https://i.imgur.com/6vvxLxR.jpeg"}
    ],
    games: [
        {name: "GN Math", url: "https://blahaj.dedyn.io/gn.html", icon: "https://cdn.discordapp.com/avatars/1366573040846241894/b449678987d3a22819a5ba8a8a9cba1b.webp?size=80"},
        {name: "Angry Birds Epic", url: "https://truffled.lol/games/Epic/index.html", icon: "https://i.imgur.com/ql7Gz9e.jpeg"}
    ],
    apps: [
        {name: "GeforceNow", url: "https://universityeducation.camdvr.org/a/hvtrs8%2F-pna%7B.eedopcgnmw%2Ccmm-mcln%2F", icon: "https://i.imgur.com/T65qqQJ.png"}
    ]
};

const DATA = {
    currentTab: "web",
    presets: [
        {id:"google", name:"Google", title:"Google", icon:"https://www.google.com/favicon.ico"},
        {id:"drive", name:"Drive", title:"My Drive - Google Drive", icon:"https://ssl.gstatic.com/docs/doclist/images/drive_2022q3_32dp.png"},
        {id:"canvas", name:"Canvas", title:"Dashboard", icon:"https://wdmcs.instructure.com/favicon.ico"},
        {id:"gmail", name:"Gmail", title:"Gmail", icon:"https://ssl.gstatic.com/ui/v1/icons/mail/rfr/gmail.ico"}
    ],
    shortcuts: JSON.parse(localStorage.getItem("userShortcuts")) || DEFAULT_SHORTCUTS,
    editingItem: { category: null, index: null }
};

const Launcher = {
    selectedPreset: JSON.parse(localStorage.getItem("preset")) || DATA.presets[1],

    open(url) {
        if (!url) return;
        let finalUrl = this.formatUrl(url);
        const win = window.open("about:blank", "_blank");
        if (!win) return alert("Pop-up blocked!");

        win.document.write(`
            <!DOCTYPE html>
            <html style="margin:0;padding:0;width:100%;height:100%;overflow:hidden;">
            <head>
                <title>${this.selectedPreset.title}</title>
                <link rel="icon" href="${this.selectedPreset.icon}">
                <style>
                    body, html { margin:0; padding:0; width:100%; height:100%; overflow:hidden; background:#000; }
                    iframe { border:none; width:100%; height:100%; display: block; }
                </style>
            </head>
            <body>
                <iframe src="${finalUrl}" allow="fullscreen; autoplay; clipboard-read; clipboard-write;"></iframe>
            </body>
            </html>
        `);
    },

    formatUrl(url) {
        url = url.trim();
        if (/^https?:\/\/.*/i.test(url)) return url;
        if (url.includes('.') && !url.includes(' ')) return "https://" + url;
        return "https://www.google.com/search?q=" + encodeURIComponent(url);
    },

    promptOpen() {
        const u = prompt("Enter URL or search term:");
        if (u) this.open(u);
    },

    setPreset(id) {
        this.selectedPreset = DATA.presets.find(p => p.id === id);
        localStorage.setItem("preset", JSON.stringify(this.selectedPreset));
        UI.renderPresets();
    }
};

const UI = {
    renderGrid() {
        const grid = document.getElementById("mainGrid");
        const items = DATA.shortcuts[DATA.currentTab] || [];
        grid.innerHTML = items.map((item, index) => `
            <div class="card">
                <img src="${item.icon}" class="card-icon" onclick="Launcher.open('${item.url}')">
                <div style="font-weight:600; margin-bottom:15px;">${item.name}</div>
                <div class="btn-group">
                    <button class="btn" onclick="UI.universalCopy('${item.url}', this)">Copy</button>
                    <button class="btn" onclick="UI.openEditModal('${DATA.currentTab}', ${index})">Edit</button>
                </div>
            </div>`).join('');
    },

    openEditModal(category, index) {
        const item = DATA.shortcuts[category][index];
        DATA.editingItem = { category, index };
        document.getElementById("editName").value = item.name;
        document.getElementById("editUrl").value = item.url;
        document.getElementById("editIcon").value = item.icon;
        this.toggleModal("editModal", true);
    },

    saveEdit() {
        const { category, index } = DATA.editingItem;
        DATA.shortcuts[category][index] = {
            name: document.getElementById("editName").value,
            url: document.getElementById("editUrl").value,
            icon: document.getElementById("editIcon").value
        };
        localStorage.setItem("userShortcuts", JSON.stringify(DATA.shortcuts));
        this.renderGrid();
        this.toggleModal("editModal", false);
    },

    universalCopy(text, btn) {
        // High-reliability copy method
        const textArea = document.createElement("textarea");
        textArea.value = text;
        document.body.appendChild(textArea);
        textArea.select();
        
        try {
            document.execCommand('copy');
            const originalText = btn.innerText;
            btn.innerText = "Copied!";
            setTimeout(() => btn.innerText = originalText, 1500);
        } catch (err) {
            console.error('Copy failed', err);
        }
        
        document.body.removeChild(textArea);
    },

    filterGrid() {
        const query = document.getElementById("searchBar").value.toLowerCase();
        document.querySelectorAll('.card').forEach(card => {
            card.classList.toggle('hidden', !card.innerText.toLowerCase().includes(query));
        });
    },

    renderPresets() {
        document.getElementById("presetGrid").innerHTML = DATA.presets.map(p => `
            <div class="preset-card ${Launcher.selectedPreset.id === p.id ? 'active' : ''}" 
                 onclick="Launcher.setPreset('${p.id}')" 
                 style="padding:16px; border-radius:16px; background:var(--glass); display:flex; align-items:center; gap:12px; cursor:pointer; border:2px solid transparent;">
                <img src="${p.icon}" style="width:20px; height:20px; border-radius:4px;">
                <span>${p.name}</span>
            </div>`).join('');
    },

    switchTab(tabId) {
        DATA.currentTab = tabId;
        document.querySelectorAll('.tab').forEach(btn => btn.classList.toggle('active', btn.innerText.toLowerCase() === tabId));
        this.renderGrid();
    },

    toggleModal(id, show) {
        document.getElementById(id).classList.toggle('active', show);
        if (show && id === 'settingsModal') this.renderPresets();
    }
};

UI.renderGrid();
</script>
</body>
</html>
