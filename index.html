<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cloaked Launcher</title>
    <style>
        :root {
            --bg-gradient: radial-gradient(circle at top, #1e293b 0%, #05070a 100%);
            --surface: #0f172a;
            --accent: #6366f1;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            height: 100vh;
            width: 100vw;
            line-height: 1.6;
            overflow: hidden; 
        }

        .container { 
            max-width: 1100px; 
            margin: 0 auto; 
            padding: 40px 20px; 
            height: 100%; 
            overflow-y: auto; 
            overflow-x: hidden;
        }
        
        header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 40px; }
        .logo { display: flex; align-items: center; gap: 12px; font-size: 1.4rem; font-weight: 800; text-transform: uppercase; }
        .logo-box { width: 32px; height: 32px; background: var(--accent); border-radius: 8px; box-shadow: 0 0 20px rgba(99, 102, 241, 0.4); }

        .search-container { margin-bottom: 40px; display: flex; justify-content: center; }
        .search-input {
            width: 100%; max-width: 500px; padding: 14px 24px; border-radius: 18px;
            background: var(--glass); border: 1px solid var(--border); color: white;
            font-size: 1rem; outline: none; transition: var(--transition);
        }
        .search-input:focus { border-color: var(--accent); background: rgba(255,255,255,0.06); }

        .action-area { display: flex; justify-content: center; gap: 15px; margin-bottom: 60px; flex-wrap: wrap; }
        .utopia-launch-btn {
            display: flex; align-items: center; gap: 12px; background: var(--glass);
            border: 1px solid var(--border); padding: 12px 24px; border-radius: 20px;
            cursor: pointer; transition: var(--transition); backdrop-filter: blur(10px);
            text-decoration: none; color: white;
        }
        .utopia-launch-btn:hover { border-color: var(--accent); transform: translateY(-3px); background: rgba(99, 102, 241, 0.1); }

        .tabs { display: flex; justify-content: center; gap: 12px; margin-bottom: 40px; }
        .btn { padding: 10px 24px; border-radius: 12px; cursor: pointer; font-weight: 600; border: 1px solid var(--border); background: var(--glass); color: var(--text-main); transition: var(--transition); }
        .btn-primary { background: var(--accent); border: none; color: white; }
        .tab.active { background: var(--accent); color: white; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 24px; padding-bottom: 40px; }
        .card { background: var(--glass); border: 1px solid var(--border); border-radius: 24px; padding: 32px; text-align: center; transition: var(--transition); }
        .card.hidden { display: none; }
        .card:hover { border-color: var(--accent); transform: translateY(-8px); background: rgba(255,255,255,0.06); }
        .card-icon { width: 80px; height: 80px; border-radius: 22px; margin-bottom: 20px; object-fit: cover; cursor: pointer; }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); display: none; align-items: center; justify-content: center; z-index: 10000; }
        .modal.active { display: flex; }
        .modal-content { background: #0f172a; padding: 40px; border-radius: 32px; width: 90%; max-width: 480px; border: 1px solid var(--border); }
        .preset-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .preset-card { padding: 16px; border-radius: 16px; background: var(--glass); display: flex; align-items: center; gap: 12px; cursor: pointer; border: 2px solid transparent; transition: var(--transition); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo"><div class="logo-box"></div> CLOAKED</div>
        <div style="display: flex; gap: 12px;">
            <button class="btn btn-primary" onclick="location.reload()">RELOAD</button>
            <button class="btn" onclick="UI.toggleModal('settingsModal', true)">CLOAK</button>
        </div>
    </header>

    <div class="search-container">
        <input type="text" class="search-input" id="searchBar" placeholder="Search shortcuts..." oninput="UI.filterGrid()">
    </div>

    <div class="action-area">
        <div class="utopia-launch-btn" onclick="Launcher.open('https://www.watchparty.me/watch/harsh-stranger-come')">
            <img src="https://watchparty.me/favicon.ico" style="width:24px;height:24px;border-radius:4px;">
            <div class="utopia-text-group">
                <span style="display:block; font-size:0.65rem; color:var(--text-muted); text-transform:uppercase;">Cloud Stream</span>
                <span style="display:block; font-weight:800; font-size:0.95rem;">VIRTUAL BROWSER</span>
            </div>
        </div>

        <div class="utopia-launch-btn" onclick="Launcher.open('https://trucving.funcionalhard.com.ar/s/')">
            <img src="https://trucving.funcionalhard.com.ar/favicon.ico" style="width:24px;height:24px;border-radius:4px;">
            <div class="utopia-text-group">
                <span style="display:block; font-size:0.65rem; color:var(--text-muted); text-transform:uppercase;">Primary Proxy</span>
                <span style="display:block; font-weight:800; font-size:0.95rem;">UTOPIA SEARCH</span>
            </div>
        </div>

        <div class="utopia-launch-btn" onclick="Launcher.promptOpen()" style="border-style: dashed;">
            <img src="https://www.gstatic.com/images/icons/material/system/2x/language_white_24dp.png" style="width:24px;height:24px;opacity:0.8;">
            <div class="utopia-text-group">
                <span style="display:block; font-size:0.65rem; color:var(--text-muted); text-transform:uppercase;">Manual</span>
                <span style="display:block; font-weight:800; font-size:0.95rem;">DIRECT URL</span>
            </div>
        </div>
    </div>

    <div class="tabs" id="tabBar">
        <button class="btn tab active" onclick="UI.switchTab('web')">WEB</button>
        <button class="btn tab" onclick="UI.switchTab('games')">GAMES</button>
        <button class="btn tab" onclick="UI.switchTab('apps')">APPS</button>
    </div>

    <div class="grid" id="mainGrid"></div>
</div>

<div class="modal" id="settingsModal">
    <div class="modal-content">
        <h2 style="margin-bottom: 24px; text-align: center;">Tab Disguise</h2>
        <div class="preset-grid" id="presetGrid"></div>
        <button class="btn btn-primary" style="width: 100%; margin-top: 32px;" onclick="UI.toggleModal('settingsModal', false)">SAVE CHANGES</button>
    </div>
</div>

<script>
const DATA = {
    currentTab: "web",
    presets: [
        {id:"google", name:"Google", title:"Google", icon:"https://www.google.com/favicon.ico"},
        {id:"drive", name:"Drive", title:"My Drive - Google Drive", icon:"https://ssl.gstatic.com/docs/doclist/images/drive_2022q3_32dp.png"},
        {id:"canvas", name:"Canvas", title:"Dashboard", icon:"https://wdmcs.instructure.com/favicon.ico"},
        {id:"gmail", name:"Gmail", title:"Gmail", icon:"https://ssl.gstatic.com/ui/v1/icons/mail/rfr/gmail.ico"}
    ],
    shortcuts: {
        web: [
            {name: "Truffled", url: "https://computerlab.strangled.net/", icon: "https://i.imgur.com/Avqlk5Q.jpeg"},
            {name: "AnuraOS", url: "https://anura.pro", icon: "https://i.imgur.com/6vvxLxR.jpeg"},
            {name: "Interstellar", url: "	snackbudget.strangled.net", icon: "https://i.imgur.com/EFMJhAC.png"},
        ],
        games: [
            {name: "GN Math", url: "https://blahaj.dedyn.io/gn.html", icon: "https://cdn.discordapp.com/avatars/1366573040846241894/b449678987d3a22819a5ba8a8a9cba1b.webp?size=80"},
            {name: "Angry Birds Epic", url: "https://truffled.lol/games/Epic/index.html", icon: "https://i.imgur.com/ql7Gz9e.jpeg"},
        ],
        apps: [
            {name: "GeforceNow", url: "https://universityeducation.camdvr.org/a/hvtrs8%2F-pna%7B.eedopcgnmw%2Ccmm-mcln%2F", icon: "https://i.imgur.com/T65qqQJ.png"},
        ]
    }
};

// Add Leave Site protection to the main dashboard
window.addEventListener('beforeunload', (e) => {
    e.preventDefault();
    e.returnValue = '';
});

const Launcher = {
    selectedPreset: JSON.parse(localStorage.getItem("preset")) || DATA.presets[1],

    open(url) {
        if (!url) return;
        let finalUrl = this.formatUrl(url);
        const win = window.open("about:blank", "_blank");
        if (!win) return alert("Pop-up blocked!");

        const doc = win.document;
        doc.open();
        doc.write(`
            <!DOCTYPE html>
            <html style="margin:0;padding:0;width:100%;height:100%;overflow:hidden;">
            <head>
                <title>${this.selectedPreset.title}</title>
                <link rel="icon" href="${this.selectedPreset.icon}">
                <style>
                    body { margin:0; padding:0; width:100%; height:100%; overflow:hidden; background:#000; }
                    iframe { border:none; width:100%; height:100%; position:absolute; top:0; left:0; }
                </style>
            </head>
            <body>
                <iframe id="ifr" src="${finalUrl}" 
                    allow="fullscreen; autoplay; cursor-lock; clipboard-read; clipboard-write; microphone; camera; display-capture" 
                    sandbox="allow-forms allow-modals allow-orientation-lock allow-pointer-lock allow-popups allow-popups-to-escape-sandbox allow-presentation allow-scripts allow-same-origin">
                </iframe>
                <script>
                    // Leave site protection inside the cloak tab
                    window.addEventListener('beforeunload', (e) => {
                        e.preventDefault();
                        e.returnValue = '';
                    });

                    window.onkeydown = function(e) {
                        if (e.key === "Escape") window.location.href = "https://classroom.google.com";
                    };
                <\/script>
            </body>
            </html>
        `);
        doc.close();
    },

    formatUrl(url) {
        url = url.trim();
        // Regex to check if it's a likely URL (contains a dot, no spaces)
        const isUrlPattern = /^https?:\/\/.*/i.test(url) || (url.includes('.') && !url.includes(' '));
        
        if (isUrlPattern) {
            return url.startsWith('http') ? url : "https://" + url;
        }
        // Fallback to Search if not a valid URL pattern to avoid Connection Reset
        return "https://www.google.com/search?q=" + encodeURIComponent(url);
    },

    promptOpen() {
        const u = prompt("Enter URL or search term:");
        if (u) this.open(u);
    },

    setPreset(id) {
        this.selectedPreset = DATA.presets.find(p => p.id === id);
        localStorage.setItem("preset", JSON.stringify(this.selectedPreset));
        UI.renderPresets();
    }
};

const UI = {
    renderGrid() {
        const grid = document.getElementById("mainGrid");
        grid.innerHTML = (DATA.shortcuts[DATA.currentTab] || []).map(item => `
            <div class="card">
                <img src="${item.icon}" class="card-icon" onclick="Launcher.open('${item.url}')" onerror="this.src='https://via.placeholder.com/80/0f172a/ffffff?text=${item.name[0]}'">
                <div style="font-weight:600; margin-bottom:15px;">${item.name}</div>
                <button class="btn" style="width:100%; font-size:12px;" onclick="UI.copyLink('${item.url}', this)">Copy Link</button>
            </div>`).join('');
    },

    filterGrid() {
        const query = document.getElementById("searchBar").value.toLowerCase();
        document.querySelectorAll('.card').forEach(card => {
            const name = card.querySelector('div').innerText.toLowerCase();
            card.classList.toggle('hidden', !name.includes(query));
        });
    },

    renderPresets() {
        document.getElementById("presetGrid").innerHTML = DATA.presets.map(p => `
            <div class="preset-card ${Launcher.selectedPreset.id === p.id ? 'active' : ''}" onclick="Launcher.setPreset('${p.id}')">
                <img src="${p.icon || 'https://via.placeholder.com/20'}" style="width:20px; border-radius:4px;">
                <span style="font-size: 0.9rem; font-weight: 500;">${p.name}</span>
            </div>`).join('');
    },

    switchTab(tabId) {
        DATA.currentTab = tabId;
        document.querySelectorAll('#tabBar .tab').forEach(btn => btn.classList.toggle('active', btn.innerText.toLowerCase() === tabId));
        this.renderGrid();
    },

    toggleModal(id, show) {
        document.getElementById(id).classList.toggle('active', show);
        if (show) this.renderPresets();
    },

    copyLink(url, btn) {
        navigator.clipboard.writeText(url).then(() => {
            const t = btn.innerText;
            btn.innerText = "COPIED!";
            setTimeout(() => btn.innerText = t, 1500);
        });
    }
};

UI.renderGrid();
</script>
</body>
</html>
